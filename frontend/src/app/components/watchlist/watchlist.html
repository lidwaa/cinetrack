<div class="list-container">
    <h2>Ma liste à voir</h2>
    <div class="movie-grid" *ngIf="watchlist.length > 0">
        <div *ngFor="let movie of watchlist" class="movie-card">
            <div [routerLink]="['/movie', movie.id]">
                <img [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" alt="{{ movie.title }}">
                <div class="movie-info">
                    <h3>{{ movie.title }}</h3>
                    <p>{{ movie.release_date | date:'yyyy' }}</p>
                </div>
            </div>
            <button (click)="remove(movie.id)" class="btn-remove">❌</button>
        </div>
    </div>
    <div *ngIf="watchlist.length === 0" class="empty-list">
        <p>Votre liste est vide.</p>
    </div>
</div>
